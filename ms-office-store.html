<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftHub — Microsoft Office Store</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f6fb;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #dde3ee;
    --ink: #0f1c2e;
    --muted: #5a6a85;
    --subtle: #eaf0fa;
    --accent: #0078d4;
    --accent2: #0063b1;
    --glow: rgba(0,120,212,0.18);
    --green: #107c10;
    --green-light: rgba(16,124,16,0.1);
    --word: #185abd;
    --excel: #107c41;
    --ppt: #c43e1c;
    --onenote: #7719aa;
    --teams: #6264a7;
    --outlook: #0078d4;
    --access: #a4373a;
    --publisher: #077568;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,120,212,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,120,212,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(243,246,251,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1.5rem, 5vw, 5rem);
    display: flex; align-items: center; justify-content: space-between;
    height: 70px;
  }

  .nav-logo {
    display: flex; align-items: center; gap: 0.6rem;
    font-weight: 800; font-size: 1.3rem;
    cursor: pointer; color: var(--ink);
    letter-spacing: -0.02em;
  }
  .nav-logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .nav-logo span { color: var(--accent2); }

  .nav-links { display: flex; gap: 2rem; }
  .nav-link {
    font-size: 0.875rem; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: color 0.2s; text-decoration: none;
  }
  .nav-link:hover { color: var(--ink); }

  .nav-right { display: flex; align-items: center; gap: 1rem; }

  .cart-pill {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--subtle); border: 1px solid var(--border);
    color: var(--ink); border-radius: 100px;
    padding: 0.45rem 1rem; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .cart-pill:hover { border-color: var(--accent); color: var(--accent2); }

  .cart-badge {
    background: var(--accent); color: #fff;
    font-size: 0.65rem; font-weight: 700;
    width: 18px; height: 18px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* ── PAGE ── */
  .page { animation: fadeUp 0.4s cubic-bezier(.22,1,.36,1) both; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(22px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ══════════ STORE PAGE ══════════ */
  .store-page { padding: 0 clamp(1.5rem, 5vw, 5rem) 6rem; position: relative; z-index: 1; }

  /* Hero */
  .hero {
    padding: 5rem 0 4rem;
    text-align: center;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(0,120,212,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(0,120,212,0.08); border: 1px solid rgba(0,120,212,0.2);
    color: var(--accent2); font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.35rem 1rem; border-radius: 100px;
    margin-bottom: 1.5rem;
  }
  .badge-dot {
    width: 6px; height: 6px; background: var(--accent2);
    border-radius: 50%; animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900; line-height: 1.05;
    letter-spacing: -0.04em;
    margin-bottom: 1.2rem;
    background: linear-gradient(135deg, #0f1c2e 0%, #0063b1 60%, #0078d4 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    color: var(--muted); font-size: 1.1rem; font-weight: 400;
    max-width: 540px; margin: 0 auto 2.5rem; line-height: 1.6;
  }

  .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  .btn-primary {
    background: var(--accent); color: #fff;
    padding: 0.85rem 2rem; border-radius: 10px;
    font-weight: 700; font-size: 0.95rem; cursor: pointer;
    border: none; transition: all 0.2s;
    box-shadow: 0 0 0 0 var(--glow);
  }
  .btn-primary:hover {
    background: #006cbe;
    box-shadow: 0 0 30px var(--glow);
    transform: translateY(-2px);
  }

  .btn-outline {
    background: #fff; color: var(--ink);
    padding: 0.85rem 2rem; border-radius: 10px;
    font-weight: 600; font-size: 0.95rem; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent2); }

  /* Stats strip */
  .stats-strip {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 0;
    border: 1px solid var(--border); border-radius: 16px;
    background: var(--card); overflow: hidden;
    margin: 3rem auto; max-width: 700px;
  }
  .stat-item {
    flex: 1; min-width: 120px;
    padding: 1.4rem 1.5rem; text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem; font-weight: 500;
    color: var(--accent2); display: block; margin-bottom: 0.2rem;
  }
  .stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  /* Filters */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .section-title {
    font-size: 1rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .result-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; color: var(--muted);
  }

  .filters {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2.5rem;
  }
  .filter-chip {
    padding: 0.4rem 1rem; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--muted);
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--ink); }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Product Grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1.25rem;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    animation: cardIn 0.5s cubic-bezier(.22,1,.36,1) both;
    position: relative;
  }
  .product-card:nth-child(2){animation-delay:.04s}
  .product-card:nth-child(3){animation-delay:.08s}
  .product-card:nth-child(4){animation-delay:.12s}
  .product-card:nth-child(5){animation-delay:.16s}
  .product-card:nth-child(6){animation-delay:.20s}
  .product-card:nth-child(7){animation-delay:.24s}
  .product-card:nth-child(8){animation-delay:.28s}
  @keyframes cardIn {
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }
  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }

  .card-top {
    padding: 2rem 1.75rem 1.5rem;
    display: flex; align-items: flex-start; justify-content: space-between;
    position: relative;
  }

  .app-icon {
    width: 68px; height: 68px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; flex-shrink: 0;
    position: relative;
  }
  .app-icon::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .card-badge {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.2rem 0.6rem; border-radius: 6px;
  }
  .badge-best { background: rgba(255,185,0,0.15); color: #ffd700; border: 1px solid rgba(255,185,0,0.3); }
  .badge-new  { background: rgba(0,188,242,0.12); color: var(--accent2); border: 1px solid rgba(0,188,242,0.3); }
  .badge-sale { background: rgba(200,62,28,0.12); color: #ff6b47; border: 1px solid rgba(200,62,28,0.3); }
  .badge-pop  { background: rgba(118,101,199,0.15); color: #a78bfa; border: 1px solid rgba(118,101,199,0.3); }

  .card-body { padding: 0 1.75rem 1.75rem; }

  .app-name {
    font-size: 1.15rem; font-weight: 800; margin-bottom: 0.2rem;
    letter-spacing: -0.01em;
  }
  .app-tagline {
    font-size: 0.78rem; color: var(--muted); font-weight: 500;
    margin-bottom: 0.9rem;
  }
  .app-desc {
    font-size: 0.875rem; color: var(--muted); line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .app-features {
    display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.4rem;
  }
  .feature-tag {
    background: var(--subtle); color: var(--muted);
    font-size: 0.7rem; font-weight: 500;
    padding: 0.2rem 0.6rem; border-radius: 6px;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 1rem; border-top: 1px solid var(--border);
  }

  .price-block {}
  .price-main {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem; font-weight: 500; color: var(--ink);
  }
  .price-period { font-size: 0.75rem; color: var(--muted); font-family: 'Outfit', sans-serif; }
  .price-old {
    font-size: 0.78rem; color: var(--muted);
    text-decoration: line-through; display: block; margin-top: -2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .buy-now-btn {
    background: var(--accent); color: #fff;
    border: none; cursor: pointer;
    padding: 0.6rem 1.3rem; border-radius: 9px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.875rem; font-weight: 700;
    transition: all 0.2s; white-space: nowrap;
  }
  .buy-now-btn:hover {
    background: #006cbe;
    box-shadow: 0 0 20px var(--glow);
    transform: scale(1.04);
  }

  /* ══════════ DETAIL PAGE ══════════ */
  .detail-page {
    padding: 2rem clamp(1.5rem, 5vw, 5rem) 6rem;
    position: relative; z-index: 1;
  }

  .breadcrumb {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.82rem; color: var(--muted); margin-bottom: 3rem;
  }
  .bc-link { color: var(--accent2); cursor: pointer; }
  .bc-link:hover { text-decoration: underline; }
  .bc-sep { color: var(--border); }

  .detail-layout {
    display: grid; grid-template-columns: 1.1fr 1fr;
    gap: 5rem; align-items: start;
  }
  @media(max-width:900px){ .detail-layout{grid-template-columns:1fr;gap:3rem} }

  /* Left panel */
  .detail-left {}

  .detail-icon-box {
    border-radius: 24px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    height: 320px; font-size: 8rem;
    margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
  }
  .icon-glow {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, var(--icon-glow,rgba(0,120,212,0.2)) 0%, transparent 65%);
  }

  .screenshots {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem;
  }
  .screenshot-thumb {
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); padding: 1rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.3rem; cursor: pointer; transition: border-color 0.2s;
    font-size: 1.4rem; text-align: center;
  }
  .screenshot-thumb:hover { border-color: var(--accent); }
  .screenshot-thumb span { font-size: 0.65rem; color: var(--muted); font-weight: 500; }

  /* Right panel */
  .detail-right {}

  .detail-app-header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
  }
  .detail-icon {
    width: 72px; height: 72px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; flex-shrink: 0;
  }
  .detail-app-meta {}
  .detail-app-name {
    font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em;
    margin-bottom: 0.15rem;
  }
  .detail-app-sub { font-size: 0.85rem; color: var(--muted); }

  .rating-row {
    display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2rem;
  }
  .stars-filled { color: #ffd700; letter-spacing: 1px; font-size: 0.9rem; }
  .review-count { font-size: 0.82rem; color: var(--muted); }
  .verified { font-size: 0.7rem; color: #22c55e; font-weight: 600; }

  .plan-selector { margin-bottom: 2rem; }
  .plan-label {
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
  }
  .plans { display: flex; flex-direction: column; gap: 0.6rem; }
  .plan-option {
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.25rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .plan-option:hover { border-color: var(--accent); }
  .plan-option.selected { border-color: var(--accent); background: rgba(0,120,212,0.08); }
  .plan-option-left { display: flex; align-items: center; gap: 0.75rem; }
  .plan-radio {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .plan-option.selected .plan-radio { border-color: var(--accent); }
  .plan-radio::after {
    content: ''; width: 8px; height: 8px;
    border-radius: 50%; background: var(--accent); display: none;
  }
  .plan-option.selected .plan-radio::after { display: block; }
  .plan-name { font-weight: 700; font-size: 0.9rem; }
  .plan-desc { font-size: 0.75rem; color: var(--muted); }
  .plan-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; font-weight: 500; color: var(--accent2);
    text-align: right;
  }
  .plan-period { font-size: 0.65rem; color: var(--muted); font-family: 'Outfit',sans-serif; display: block; }

  .detail-price-display {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .total-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.2rem; }
  .total-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 500; color: var(--ink);
  }
  .total-savings {
    font-size: 0.75rem; color: #22c55e; font-weight: 600; margin-top: 0.15rem;
  }
  .discount-badge-detail {
    background: rgba(200,62,28,0.15); color: #ff6b47;
    font-size: 0.8rem; font-weight: 700;
    padding: 0.4rem 0.8rem; border-radius: 8px;
    border: 1px solid rgba(200,62,28,0.3);
  }

  .actions { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

  .add-cart-btn {
    flex: 1; background: var(--accent); color: #fff;
    border: none; cursor: pointer;
    padding: 1rem; border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 700;
    transition: all 0.25s;
  }
  .add-cart-btn:hover {
    background: #006cbe;
    box-shadow: 0 0 30px var(--glow);
    transform: translateY(-2px);
  }
  .add-cart-btn.success { background: var(--green); }

  .try-btn {
    padding: 1rem 1.5rem; border-radius: 12px;
    border: 1px solid var(--border); background: var(--subtle);
    color: var(--ink); cursor: pointer;
    font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem;
    transition: all 0.2s; white-space: nowrap;
  }
  .try-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .guarantees {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
    margin-bottom: 2rem;
  }
  .guarantee-item {
    background: var(--subtle); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem; color: var(--muted);
  }
  .guarantee-icon { font-size: 1rem; }

  .features-section { margin-bottom: 2rem; }
  .features-heading {
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }
  .feature-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .feature-row {
    display: flex; align-items: flex-start; gap: 0.75rem;
    font-size: 0.875rem; line-height: 1.5;
  }
  .feature-check {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--green-light); color: #4ade80;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .feature-text { color: var(--muted); }
  .feature-text strong { color: var(--ink); font-weight: 600; }

  /* Related */
  .related-section {
    margin-top: 5rem; padding-top: 3rem;
    border-top: 1px solid var(--border);
  }
  .related-heading {
    font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: #fff; border: 1px solid var(--border);
    color: var(--ink); padding: 0.9rem 1.5rem;
    border-radius: 12px; font-size: 0.875rem; font-weight: 500;
    z-index: 999; animation: toastIn 0.3s ease both;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    display: flex; align-items: center; gap: 0.5rem;
  }
  @keyframes toastIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .toast.hide { animation: toastOut 0.3s ease both; }
  @keyframes toastOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(16px)} }

  /* responsive */
  @media(max-width:600px){
    .product-grid { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .guarantees { grid-template-columns: 1fr; }
    .screenshots { grid-template-columns: repeat(3,1fr); }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="showStore()">
    <div class="nav-logo-icon">⊞</div>
    Soft<span>Hub</span>
  </div>
  <div class="nav-links">
    <span class="nav-link" onclick="showStore()">Products</span>
    <span class="nav-link">Bundles</span>
    <span class="nav-link">Business</span>
    <span class="nav-link">Support</span>
  </div>
  <div class="nav-right">
    <div class="cart-pill" onclick="showCartMsg()">
      🛒 Cart <span class="cart-badge" id="cartCount">0</span>
    </div>
  </div>
</nav>

<div id="app"></div>

<script>
const products = [
  {
    id: 1,
    name: 'Microsoft Word',
    tagline: 'The world\'s most powerful word processor',
    category: 'Productivity',
    icon: '📝',
    color: '#185abd',
    glowColor: 'rgba(24,90,189,0.3)',
    badge: 'Best Seller', badgeClass: 'badge-best',
    rating: 4.9, reviews: 124500,
    shortDesc: 'Create, edit and collaborate on professional documents with AI-powered writing assistance and rich formatting tools.',

let cartCount = 0;
let currentFilter = 'All';
const categories = ['All', ...new Set(products.map(p => p.category))];

function setCart(n){
  cartCount = n;
  document.getElementById('cartCount').textContent = cartCount;
}

function showToast(msg){
  const e = document.querySelector('.toast');
  if(e) e.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span style="color:#4ade80">✓</span> ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>{ t.classList.add('hide'); setTimeout(()=>t.remove(), 350); }, 2500);
}

function showCartMsg(){
  showToast(`${cartCount} item${cartCount!==1?'s':''} in your cart`);
}

function starsHTML(r){
  return '★'.repeat(Math.round(r)) + '☆'.repeat(5-Math.round(r));
}

function formatNum(n){
  return n >= 1000 ? (n/1000).toFixed(0)+'k+' : n;
}

  const p = products.find(x=>x.id===id);
  if(!p) return;
  window._selectedPlan = 0;
  window._product = p;

  const related = products.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,3);

  renderDetail(p, related);
  window.scrollTo({top:0,behavior:'smooth'});
}

    btn.textContent='✓ Added to Cart!';

      btn.textContent='🛒 Add to Cart';
      btn.classList.remove('success');
    }, 2000);
  }
  showToast(`${name} added to cart`);
}

// Float animation
const s = document.createElement('style');
s.textContent=`@keyframes floatIcon{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-14px) scale(1.05)}}`;
document.head.appendChild(s);

renderStore();
</script>
</body>
